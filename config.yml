serpapi:
  engine: google
  gl: ca
  hl: en
  location: Vancouver, British Columbia, Canada
  num: 100
  device: desktop
  google_max_pages: 3
  google_max_results: 300
  maps_max_pages: 3
  retry_max_attempts: 3
  retry_backoff_seconds: 1.0
  request_delay_seconds: 0.2
  no_cache: false
  ai_fallback_without_location: true
  related_questions_ai_followup: true
  related_questions_ai_max_calls: 5
files:
  input_csv: keywords_Couple_Marriage_RelationshipLocal.csv
  output_xlsx: output/market_analysis_couple_marriage_relationshiplocal_20260401_1810.xlsx
  output_json: output/market_analysis_couple_marriage_relationshiplocal_20260401_1810.json
  output_md: output/market_analysis_couple_marriage_relationshiplocal_20260401_1810.md
  domain_overrides: domain_overrides.yml
enrichment:
  enabled: true
  max_urls_per_keyword: 5
  timeout_seconds: 10
  user_agent: MarketIntelligenceBot/1.0
  enable_domain_age: false
app:
  force_local_intent: true
  balanced_mode: true
  deep_research_mode: false
  ai_query_priority_actions:
  - defend
  - strengthen
  - enter_cautiously
moz:
  cache_ttl_days: 30
# SERP intent verdict (spec v2 Gap 1). All keys are optional — defaults from
# intent_verdict.DEFAULT_THRESHOLDS apply if omitted. Domain judgment lives in
# intent_mapping.yml, not here.
serp_intent:
  thresholds:
    primary_share: 0.60          # ≥60% share → that intent is primary
    fallback_share: 0.40         # else, ≥40% with runner-up ≤ 20% → primary
    fallback_runner_up_max: 0.20
    confidence_high: 0.80        # classified ratio ≥ 0.80 → high confidence
    confidence_medium: 0.50      # ≥ 0.50 → medium; else low
# Optional list of known competitor brand names/domains. Drives:
#   - domain_role=known_competitor in intent_verdict (URLs from these brands
#     are tagged navigational regardless of content type)
#   - brand_only detection in title_patterns (along with client_name_patterns)
# Leave empty if you don't actively track named rivals.
known_brands: []
# Spec v2 Gap 4: client capability hints for mixed-intent strategy.
client:
  # Intents the client can produce content for. Used by _compute_strategic_flags
  # to decide mixed_intent_strategy on mixed-intent SERPs:
  #   - if dominant intent is one the client already ranks for → compete_on_dominant
  #   - elif a non-dominant intent on the SERP is in this list → backdoor
  #   - else → avoid
  # Living Systems: educational guides (informational), counselling services
  # (transactional + local). Add 'commercial_investigation' if you create
  # comparison/listicle content; leave it out if you don't.
  preferred_intents:
    - informational
    - transactional
    - local
feasibility:
  enabled: true
  client_da: 35
  non_profit_location: North Vancouver
  pivot_serp_fetch: true
  neighborhoods:
  - Lonsdale
  - Edgemont Village
  - Lynn Valley
  - Deep Cove
  - Canyon Heights
audit_targets:
  n: 10                  # top N organic URLs per keyword sent to Tool 2
  omit_from_audit: []    # domains never sent to Tool 2 (e.g. major directories)
analysis_report:
  client_name: Living Systems Counselling
  client_domain: livingsystems.ca
  client_name_patterns:
  - Living Systems
  org_type: Small nonprofit counselling organization, established 1971
  location: North Vancouver, BC, Canada
  framework_description: Bowen Family Systems Theory. Core concepts include differentiation
    of self, emotional cutoff, triangles, and multigenerational transmission.
  content_focus: Counselling services, Bowen Theory training programs, conferences,
    and educational content.
  additional_context: Budget is limited. Prioritize practical recommendations that
    fit a small nonprofit and avoid mismatched audiences such as court-mandated reunification
    services.
