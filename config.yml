serpapi:
  engine: google
  gl: ca
  hl: en
  location: Vancouver, British Columbia, Canada
  num: 100
  device: desktop
  google_max_pages: 3
  google_max_results: 300
  maps_max_pages: 3
  retry_max_attempts: 3
  retry_backoff_seconds: 1.0
  request_delay_seconds: 0.2
  no_cache: false
  ai_fallback_without_location: true
  related_questions_ai_followup: true
  related_questions_ai_max_calls: 5
files:
  input_csv: keywords_couples_therapy.csv
  output_xlsx: output/market_analysis_couples_therapy_20260501_1517.xlsx
  output_json: output/market_analysis_couples_therapy_20260501_1517.json
  output_md: output/market_analysis_couples_therapy_20260501_1517.md
  domain_overrides: domain_overrides.yml
enrichment:
  enabled: true
  max_urls_per_keyword: 5
  timeout_seconds: 10
  user_agent: MarketIntelligenceBot/1.0
  enable_domain_age: false
app:
  force_local_intent: true
  balanced_mode: true
  deep_research_mode: false
  ai_query_priority_actions:
  - defend
  - strengthen
  - enter_cautiously
moz:
  cache_ttl_days: 30
serp_intent:
  thresholds:
    primary_share: 0.6
    fallback_share: 0.4
    fallback_runner_up_max: 0.2
    confidence_high: 0.8
    confidence_medium: 0.5
known_brands: []
client:
  preferred_intents:
  - informational
  - transactional
  - local
feasibility:
  enabled: true
  client_da: 35
  non_profit_location: North Vancouver
  pivot_serp_fetch: true
  neighborhoods:
  - Lonsdale
  - Edgemont Village
  - Lynn Valley
  - Deep Cove
  - Canyon Heights
audit_targets:
  n: 10
  omit_from_audit: []
analysis_report:
  client_name: Living Systems Counselling
  client_domain: livingsystems.ca
  client_name_patterns:
  - Living Systems
  org_type: Small nonprofit counselling organization, established 1971
  location: North Vancouver, BC, Canada
  framework_description: Bowen Family Systems Theory. Core concepts include differentiation
    of self, emotional cutoff, triangles, and multigenerational transmission.
  content_focus: Counselling services, Bowen Theory training programs, conferences,
    and educational content.
  additional_context: Budget is limited. Prioritize practical recommendations that
    fit a small nonprofit and avoid mismatched audiences such as court-mandated reunification
    services.
