# strategic_patterns.yml
#
# Bowen theory strategic pattern definitions for SERP analysis.
#
# A pattern fires when ANY of its trigger words appears as a whole word
# in the SERP ngram corpus for a run (word-boundary match, case-insensitive).
#
# To add a new pattern: append an entry below. No Python changes required.
# Field names must match exactly (they are written directly into the JSON output).

- Pattern_Name: The Medical Model Trap
  Triggers:
    - clinical
    - registered
    - diagnosis
    - disorder
    - mental health
    - patient
    - treatment
  Status_Quo_Message: >-
    You are sick/broken and need an expert to fix you (External Locus of Control).
  Bowen_Bridge_Reframe: >-
    Shift from pathology to functioning. You don't need a diagnosis;
    you need a map of your emotional system.
  Content_Angle: >-
    Why turning relationship problems into a diagnosis keeps you stuck.

- Pattern_Name: The Fusion Trap
  Triggers:
    - connection
    - bond
    - close
    - intimacy
    - communication
    - reconnect
    - reach out
  Status_Quo_Message: >-
    The goal is to force closeness, agreement, or reconnection as quickly as possible.
  Bowen_Bridge_Reframe: >-
    Sustainable contact requires differentiation. Anxiety-driven pursuit often
    increases reactivity and deepens cutoff.
  Content_Angle: >-
    Why trying to force reconnection may deepen the cutoff.

- Pattern_Name: The Resource Trap
  Triggers:
    - free
    - low cost
    - sliding scale
    - cheap
    - affordable
    - covered
    - insurance
  Status_Quo_Message: >-
    High anxiety about resources/access. Seeking immediate symptom relief (venting).
  Bowen_Bridge_Reframe: >-
    Address the anxiety driving the search. Cheap relief often delays real
    structural change.
  Content_Angle: >-
    When short-term relief becomes a substitute for working the family pattern.

- Pattern_Name: The Blame/Reactivity Trap
  Triggers:
    - narcissist
    - toxic
    - abusive
    - mean
    - angry
    - hate
    - deal with
  Status_Quo_Message: >-
    The problem is the other person (The Identified Patient).
  Bowen_Bridge_Reframe: >-
    Focus on self-regulation. You cannot change them, only your response to them.
  Content_Angle: >-
    Stop diagnosing the other person and start observing your own reactivity.
